views:
  - title: NAD C368
    path: nad
    icon: mdi:speaker
    cards:
      - type: picture
        image: https://raw.githubusercontent.com/MrStaLu/nad-c368-homeassistant/main/images/logo.png
      - type: media-control
        entity: media_player.nad_c368
      # Volume in % or dB — flip with the toggle. Both share the same mapping,
      # so 0 % = Min volume and 100 % = Max volume in either view.
      - type: entities
        title: Volume
        show_header_toggle: false
        entities:
          - entity: switch.nad_c368_volume_in_db
            name: Show in dB
      - type: conditional
        conditions:
          - entity: switch.nad_c368_volume_in_db
            state: "off"
        card:
          type: entities
          show_header_toggle: false
          entities:
            - entity: number.nad_c368_volume_percent
              name: Volume (%)
      - type: conditional
        conditions:
          - entity: switch.nad_c368_volume_in_db
            state: "on"
        card:
          type: entities
          show_header_toggle: false
          entities:
            - entity: number.nad_c368_volume_db
              name: Volume (dB)
      - type: grid
        title: Inputs (on / off)
        columns: 2
        square: false
        cards:
          - type: tile
            entity: switch.nad_c368_input_1_enabled
            name: Input 1
            icon: mdi:power
            color: blue
          - type: tile
            entity: switch.nad_c368_input_2_enabled
            name: Input 2
            icon: mdi:power
            color: blue
          - type: tile
            entity: switch.nad_c368_input_3_enabled
            name: Input 3
            icon: mdi:power
            color: blue
          - type: tile
            entity: switch.nad_c368_input_4_enabled
            name: Input 4
            icon: mdi:power
            color: blue
          - type: tile
            entity: switch.nad_c368_input_5_enabled
            name: Input 5
            icon: mdi:power
            color: blue
          - type: tile
            entity: switch.nad_c368_input_6_enabled
            name: Input 6
            icon: mdi:power
            color: blue
          - type: tile
            entity: switch.nad_c368_input_7_enabled
            name: Input 7
            icon: mdi:power
            color: blue
          - type: tile
            entity: switch.nad_c368_input_8_enabled
            name: Input 8
            icon: mdi:power
            color: blue
      - type: entities
        title: Audio
        show_header_toggle: false
        entities:
          - entity: number.nad_c368_bass
            name: Bass
          - entity: number.nad_c368_treble
            name: Treble
          - entity: number.nad_c368_balance
            name: Balance
          - type: divider
          - entity: switch.nad_c368_speaker_a
            name: Speaker A
          - entity: switch.nad_c368_speaker_b
            name: Speaker B
          - entity: switch.nad_c368_tone_defeat
            name: Tone defeat
      - type: entities
        title: Settings
        show_header_toggle: false
        entities:
          - entity: number.nad_c368_minimum_volume
            name: Min volume
          - entity: number.nad_c368_maximum_volume
            name: Max volume
          - entity: number.nad_c368_volume_step
            name: Volume step
          - entity: number.nad_c368_poll_interval
            name: Poll interval
      - type: entities
        title: Input names
        show_header_toggle: false
        entities:
          - entity: text.nad_c368_input_1_name
            name: Input 1
          - entity: text.nad_c368_input_2_name
            name: Input 2
          - entity: text.nad_c368_input_3_name
            name: Input 3
          - entity: text.nad_c368_input_4_name
            name: Input 4
          - entity: text.nad_c368_input_5_name
            name: Input 5
          - entity: text.nad_c368_input_6_name
            name: Input 6
          - entity: text.nad_c368_input_7_name
            name: Input 7
          - entity: text.nad_c368_input_8_name
            name: Input 8
